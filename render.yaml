services:
  - type: web
    name: legal-ease-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: legalease-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_PATH
        value: /var/data/legalease.db
      - key: GENERATED_REPORTS_DIR
        value: /var/data/generated_reports
      - key: DOCUMENT_UPLOADS_DIR
        value: /var/data/uploaded_documents
      - key: RATE_LIMIT_MAX
        value: "15"
      - key: RATE_LIMIT_WINDOW
        value: "3600"
      - key: EMAIL_ENABLED
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Legal Ease AI
      - key: EMAIL_FROM_ADDR
        sync: false
